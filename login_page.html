<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Creative Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&display=swap');
        
        body {
            background-color: #0d0d0d;
            font-family: 'Space Grotesk', sans-serif;
            /* Y2K Grain overlay */
            background-image: radial-gradient(#2a2a2a 0.5px, transparent 0.5px);
            background-size: 20px 20px;
        }

        .neo-brutalism {
            background: #1a1a1a;
            border: 3px solid #fff;
            box-shadow: 8px 8px 0px 0px #8b5cf6; /* Purple Offset Shadow */
        }

        .glitch-text {
            text-shadow: 2px 2px 0px #39ff14;
        }

        input {
            border: 2px solid #333;
        }

        input:focus {
            border-color: #8b5cf6 !important;
            outline: none;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 text-white">

    <div class="neo-brutalism w-full max-w-sm rounded-none p-8 transition-all hover:translate-x-[-4px] hover:translate-y-[-4px] hover:shadow-[12px_12px_0px_0px_#8b5cf6]">
        
        <!-- Header -->
        <div class="mb-8">
            <h1 class="text-5xl font-bold tracking-tighter mb-2 glitch-text uppercase">Studio.</h1>
            <p class="text-sm border-l-2 border-green-400 pl-3 text-gray-400">BUILDING THE FUTURE OF THE WEB.</p>
        </div>

        <form class="space-y-6">
            <div>
                <label class="block text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-2">Access Key</label>
                <input type="email" placeholder="USER_ID" class="w-full bg-black text-white px-4 py-3 font-mono">
            </div>

            <div>
                <label class="block text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-2">Secret Code</label>
                <input type="password" placeholder="••••••••" class="w-full bg-black text-white px-4 py-3 font-mono">
            </div>

            <button type="submit" 
                class="w-full bg-white text-black font-black py-4 uppercase tracking-widest hover:bg-green-400 transition-all active:translate-y-1">
                Enter Portal
            </button>
        </form>

        <!-- Footer -->
        <div class="mt-8 pt-6 border-t border-gray-800 text-center text-[10px] uppercase tracking-widest text-gray-500">
            No account? <a href="#" class="text-white underline hover:text-purple-400">Register here</a>
        </div>
    </div>

</body>
</html>
