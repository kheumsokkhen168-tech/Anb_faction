<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Digital Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0a0a0a;
            background-image: 
                radial-gradient(at 0% 0%, rgba(138, 43, 226, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(57, 255, 20, 0.1) 0px, transparent 50%);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 text-white">

    <div class="glass-card w-full max-w-md rounded-3xl p-8 shadow-2xl">
        <!-- Header -->
        <div class="mb-10 text-center">
            <h1 class="text-4xl font-bold tracking-tight mb-2">Welcome Back</h1>
            <p class="text-gray-400">Enter your details to access your dashboard</p>
        </div>

        <form class="space-y-6">
            <!-- Email Input -->
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">Email Address</label>
                <input type="email" 
                    placeholder="name@example.com"
                    class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-purple-500 transition-all">
            </div>

            <!-- Password Input -->
            <div>
                <div class="flex justify-between mb-2">
                    <label class="text-sm font-medium text-gray-300">Password</label>
                    <a href="#" class="text-xs text-purple-400 hover:text-purple-300">Forgot?</a>
                </div>
                <input type="password" 
                    placeholder="••••••••"
                    class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-purple-500 transition-all">
            </div>

            <!-- Action Button -->
            <button type="submit" 
                class="w-full bg-white text-black font-bold py-3 rounded-xl hover:bg-purple-400 hover:text-white transition-all duration-300 transform active:scale-95">
                Sign In
            </button>
        </form>

        <!-- Footer -->
        <div class="mt-8 text-center text-sm text-gray-500">
            Don't have an account? 
            <a href="#" class="text-white font-semibold hover:underline">Create one</a>
        </div>
    </div>

</body>
</html>
