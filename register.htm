<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join | Digital Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&display=swap');
        
        body {
            background-color: #0d0d0d;
            font-family: 'Space Grotesk', sans-serif;
            background-image: radial-gradient(#1a1a1a 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .neo-brutalism {
            background: #000;
            border: 3px solid #fff;
            box-shadow: 12px 12px 0px 0px #39ff14; /* Neon Green Shadow */
        }

        input {
            border: 2px solid #333 !important;
            background: #111 !important;
            font-family: monospace;
        }

        input:focus {
            border-color: #39ff14 !important;
            outline: none;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 text-white">

    <div class="neo-brutalism w-full max-w-4xl flex flex-col md:flex-row overflow-hidden">
        
        <!-- Sidebar Info -->
        <div class="hidden md:flex md:w-1/3 bg-[#39ff14] text-black p-10 flex-col justify-between">
            <div>
                <div class="h-12 w-12 border-4 border-black mb-8 rotate-3"></div>
                <h2 class="text-3xl font-black leading-tight uppercase">Enter the <br>Ecosystem.</h2>
            </div>
            <div class="text-[11px] font-bold uppercase tracking-widest space-y-4">
                <p>● Full API Access</p>
                <p>● Priority Deployments</p>
                <p>● Community Alpha</p>
            </div>
        </div>

        <!-- Form Section -->
        <div class="flex-1 p-8 md:p-12 bg-black">
            <div class="mb-10">
                <h1 class="text-4xl font-black mb-2 uppercase tracking-tighter">Create Account</h1>
                <p class="text-gray-400 text-xs font-bold uppercase tracking-widest">Join a new generation of creators.</p>
            </div>

            <form class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-2">First Name</label>
                        <input type="text" placeholder="JOHN" class="w-full px-4 py-3 text-white">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-2">Last Name</label>
                        <input type="text" placeholder="DOE" class="w-full px-4 py-3 text-white">
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-2">Email Address</label>
                    <input type="email" placeholder="USER@DOMAIN.COM" class="w-full px-4 py-3 text-white">
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-2">Set Password</label>
                    <input type="password" placeholder="••••••••" class="w-full px-4 py-3 text-white">
                </div>

                <div class="flex items-start space-x-3 py-2">
                    <input type="checkbox" class="mt-1 accent-[#39ff14]">
                    <label class="text-[10px] text-gray-400 uppercase tracking-wider leading-relaxed">
                        I agree to the <a href="#" class="text-white underline">Terms</a> and <a href="#" class="text-white underline">Privacy Policy</a>.
                    </label>
                </div>

                <button type="submit" 
                    class="w-full bg-[#39ff14] text-black font-black py-4 uppercase tracking-widest hover:bg-white transition-all active:translate-y-1">
                    Initialize Profile
                </button>
            </form>

            <p class="mt-8 text-center text-[10px] uppercase tracking-widest text-gray-500">
                Already a member? 
                <a href="#" class="text-white font-bold underline hover:text-[#39ff14]">Login here</a>
            </p>
        </div>
    </div>

</body>
</html>
