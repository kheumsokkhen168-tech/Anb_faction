<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Join the Community</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0a0a0a;
            background-image: 
                radial-gradient(at 100% 0%, rgba(138, 43, 226, 0.15) 0px, transparent 50%),
                radial-gradient(at 0% 100%, rgba(57, 255, 20, 0.1) 0px, transparent 50%);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 text-white">

    <div class="glass-card w-full max-w-2xl rounded-[2rem] overflow-hidden shadow-2xl flex flex-col md:flex-row">
        <!-- Sidebar/Info Section (Hidden on mobile) -->
        <div class="hidden md:flex md:w-1/3 bg-white/5 p-8 flex-col justify-between border-r border-white/5">
            <div>
                <div class="h-10 w-10 bg-purple-500 rounded-lg mb-6"></div>
                <h2 class="text-2xl font-bold leading-tight">Start your journey with us.</h2>
            </div>
            <div class="text-xs text-gray-500 space-y-2">
                <p>✓ Access to all features</p>
                <p>✓ 24/7 Priority support</p>
                <p>✓ Community insights</p>
            </div>
        </div>

        <!-- Section -->
        <div class="flex-1 p-8 md:p-12">
            <div class="mb-8">
                <h1 class="text-3xl font-bold mb-2">Create Account</h1>
                <p class="text-gray-400 text-sm">Join a new generation of creators.</p>
            </div>

            <form class="space-y-5">
                <!-- Name Row -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-medium text-gray-400 uppercase tracking-wider mb-2">First Name</label>
                        <input type="text" placeholder="John" 
                            class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-green-400 transition-all">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-400 uppercase tracking-wider mb-2">Last Name</label>
                        <input type="text" placeholder="Doe" 
                            class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-green-400 transition-all">
                    </div>
                </div>

                <!-- Email -->
                <div>
                    <label class="block text-xs font-medium text-gray-400 uppercase tracking-wider mb-2">Email Address</label>
                    <input type="email" placeholder="hello@domain.com" 
                        class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-green-400 transition-all">
                </div>

                <!-- Password -->
                <div>
                    <label class="block text-xs font-medium text-gray-400 uppercase tracking-wider mb-2">Set Password</label>
                    <input type="password" placeholder="••••••••" 
                        class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-green-400 transition-all">
                </div>

                <!-- Terms -->
                <div class="flex items-start space-x-3 py-2">
                    <input type="checkbox" class="mt-1 accent-green-400">
                    <label class="text-xs text-gray-400 leading-relaxed">
                        I agree to the <a href="#" class="text-white underline">Terms of Service</a> and <a href="#" class="text-white underline">Privacy Policy</a>.
                    </label>
                </div>

                <!-- Submit -->
                <button type="submit" 
                    class="w-full bg-green-400 text-black font-bold py-3.5 rounded-xl hover:bg-white transition-all duration-300 transform active:scale-[0.98]">
                    Create Account
                </button>
            </form>

            <p class="mt-8 text-center text-sm text-gray-500">
                Already a member? 
                <a href="#" class="text-white font-semibold hover:text-green-400 transition-colors">Log in</a>
            </p>
        </div>
    </div>

</body>
</html>
